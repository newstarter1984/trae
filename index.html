<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="汉字学习">
    <title>汉字学习</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <div class="input-section">
            <input 
                type="text" 
                id="pinyinInput" 
                placeholder="输入拼音或汉字 (如: ni 或 你)" 
                autocomplete="off"
                autocapitalize="off"
            >
        </div>
        
        <div class="hanzi-section">
            <div id="hanziCanvas" class="hanzi-canvas"></div>
        </div>
        
        <div class="pinyin-section">
            <div id="pinyinDisplay" class="pinyin-text"></div>
        </div>
        
        <div class="words-section">
            <div id="wordsDisplay" class="words-container"></div>
        </div>
        
        <div class="controls">
            <button id="animateBtn" class="btn">重新动画</button>
        </div>
        
        <div class="timestamp-section">
            <div id="timestamp" class="timestamp-text"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="app.js?v=2"></script>
</body>
</html>
