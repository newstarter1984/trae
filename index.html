        <div class="input-section">
            <input

                id="pinyinInput" 
                placeholder="输入拼音或汉字 (如: ni 或 你)" 
                autocomplete="off"
                autocapitalize="off"
            >
        </div>
        
        <div class="hanzi-section">
            <div id="hanziCanvas" class="hanzi-canvas"></div>
        </div>

            <div id="pinyinDisplay" class="pinyin-text"></div>
        </div>
        
        <div class="words-section">
            <div id="wordsDisplay" class="words-container"></div>
        </div>
        
        <div class="controls">
            <button id="animateBtn" class="btn">🔄 重新动画</button>
            <button id="nextThemeBtn" class="btn">🎨 下一主题</button>
        </div>
        
        <div class="install-section" id="installSection">
            <button id="installBtn" class="btn install-btn">📱 添加到主屏幕</button>
        </div>
        
        <div class="install-tip-section" id="installTipSection">
            <div class="install-tip">
                <p>💡 iPhone/Safari用户：</p>
                <p>点击Safari底部 <span style="font-size: 20px;">⎋</span> 分享按钮</p>

            <div id="timestamp" class="timestamp-text"></div>
        </div>
