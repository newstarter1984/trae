<!DOCTYPE html>
<html lang="zh-CN" class="theme-day-grass">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="元宝学习小世界">
    <title>元宝学习小世界</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=12">
</head>
<body>
    <div class="mob-container">
        <div class="mob mob-1">🐷</div>
        <div class="mob mob-2">🐑</div>
        <div class="mob mob-3">🐄</div>
        <div class="mob mob-4">🐔</div>
        <div class="mob mob-5">🐕</div>
        <div class="mob mob-6">🐈</div>
        <div class="mob mob-7">🐎</div>
        <div class="mob mob-8">🦙</div>
        <div class="mob mob-9">🦊</div>
        <div class="mob mob-10">🐻</div>
        <div class="mob mob-11">🦄</div>
        <div class="mob mob-12">🐺</div>
        <div class="mob mob-13">🦝</div>
        <div class="mob mob-14">🐰</div>
        <div class="mob mob-15">🐿️</div>
        <div class="mob mob-16">🦎</div>
        <div class="mob mob-17">🦔</div>
        <div class="mob mob-18">🐢</div>
        <div class="mob mob-19">🦅</div>
        <div class="mob mob-20">🦉</div>
    </div>
    <div class="container">
        <div class="header">
            <h1 class="title">🎮 元宝学习小世界</h1>
            <div id="themeIndicator" class="theme-indicator">当前主题: 草原白天</div>
        </div>
        
        <div class="input-section">
            <input 
                type="text" 
                id="pinyinInput" 
                placeholder="输入拼音或汉字 (如: ni 或 你)" 
                autocomplete="off"
                autocapitalize="off"
            >
        </div>
        
        <div class="hanzi-section">
            <div id="hanziCanvas" class="hanzi-canvas"></div>
        </div>
        
        <div class="pinyin-section">
            <div id="pinyinDisplay" class="pinyin-text"></div>
        </div>
        
        <div class="words-section">
            <div id="wordsDisplay" class="words-container"></div>
        </div>
        
        <div class="controls">
            <button id="animateBtn" class="btn">🔄 重新动画</button>
            <button id="nextThemeBtn" class="btn">🎨 下一主题</button>
        </div>
        
        <div class="install-section" id="installSection">
            <button id="installBtn" class="btn install-btn">📱 添加到主屏幕</button>
        </div>
        
        <div class="install-tip-section" id="installTipSection">
            <div class="install-tip">
                <p>💡 iPhone/Safari用户：</p>
                <p>点击Safari底部 <span style="font-size: 20px;">⎋</span> 分享按钮</p>
                <p>向下滑动 → 选择「添加到主屏幕」</p>
            </div>
        </div>
        
        <div class="timestamp-section">
            <div id="timestamp" class="timestamp-text"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="app.js?v=12"></script>
</body>
</html>
